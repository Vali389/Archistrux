<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║ IMPORTANT — If emails show a Gmail-style card and NOT name/phone/message: ║
  ║ In EmailJS → Email Templates → YOUR template → replace ALL “Content”     ║
  ║ with the HTML below. Turn ON “HTML” / paste in the HTML editor (not only  ║
  ║ the plain visual editor). Save. Variables MUST stay {{double braces}}.   ║
  ╚══════════════════════════════════════════════════════════════════════════╝

  Service: service_y518atj  |  Template: template_h8c27t2

  Subject line (field above body):  Contact Us: {{title}}

  Sidebar:  To = your Gmail
            From Name = {{name}}
            Reply To = {{email}}

  Paste from <!DOCTYPE html> through </html> (do not paste this comment block).
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website enquiry</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f1ea; font-family: Georgia, 'Times New Roman', serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f1ea; padding: 32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); border: 1px solid #e8e2d6;">
            <tr>
              <td style="background-color: #141210; padding: 24px 28px; text-align: center;">
                <p style="margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.06em; color: #e8c56a; text-transform: uppercase;">
                  ArchiStrux
                </p>
                <p style="margin: 8px 0 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; letter-spacing: 0.18em; color: #c4b896; text-transform: uppercase;">
                  Engineering &amp; Interiors
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 28px 28px 8px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                <p style="margin: 0; font-size: 12px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #a67c1a;">
                  New website enquiry
                </p>
                <h1 style="margin: 12px 0 0; font-size: 20px; font-weight: 700; color: #1a1a1a; line-height: 1.3;">
                  {{subject}}
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 28px;">
                <div style="height: 3px; background-color: #c9a227; border-radius: 2px;"></div>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px 28px 8px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="padding: 10px 0; border-bottom: 1px solid #f0ebe3;">
                      <p style="margin: 0 0 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8a8270;">Name</p>
                      <p style="margin: 0; font-size: 16px; color: #1a1a1a;">{{from_name}}</p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 14px 0; border-bottom: 1px solid #f0ebe3;">
                      <p style="margin: 0 0 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8a8270;">Email</p>
                      <p style="margin: 0; font-size: 16px;"><a href="mailto:{{from_email}}" style="color: #a67c1a; text-decoration: none;">{{from_email}}</a></p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 14px 0; border-bottom: 1px solid #f0ebe3;">
                      <p style="margin: 0 0 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8a8270;">Phone</p>
                      <p style="margin: 0; font-size: 16px; color: #1a1a1a;">{{phone}}</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 28px 28px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                <p style="margin: 0 0 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8a8270;">Message</p>
                <div style="background-color: #faf8f4; border: 1px solid #ebe6dc; border-radius: 8px; padding: 18px 20px; font-size: 15px; line-height: 1.65; color: #2d2d2d; white-space: pre-wrap;">{{message}}</div>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 28px 28px; background-color: #faf8f4; border-top: 1px solid #ebe6dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
                <p style="margin: 0; font-size: 12px; color: #8a8270; line-height: 1.5;">
                  ArchiStrux Engineering &amp; Interiors Pvt. Ltd.<br />
                  <span style="color: #b8b0a0;">This message was sent from your website contact form.</span>
                </p>
              </td>
            </tr>
          </table>
          <p style="margin: 20px 0 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; color: #a39a88;">
            Reply: {{from_email}}
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
